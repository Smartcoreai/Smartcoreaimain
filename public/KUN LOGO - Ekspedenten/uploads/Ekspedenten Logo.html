<!doctype html>
<html lang="nb"><head>
<meta charset="utf-8">
<title>Ekspedenten — Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --navy:#1a1a2e;
    --gold:#c9a961;
    --gold-soft:#b79652;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#f2f2ee;font-family:"Cormorant Garamond",serif;color:var(--navy)}
  body{display:grid;place-items:center;padding:40px}
  .banner{
    width:min(1200px, 100%);
    background:var(--bg);
    display:grid;
    grid-template-columns: 360px 1fr;
    align-items:center;
    padding:48px 64px 48px 48px;
    gap:48px;
    box-shadow:0 30px 80px -40px rgba(0,0,0,.2);
  }
  .mark{display:flex;align-items:center;justify-content:center}
  .mark img{width:100%;max-width:320px;height:auto;display:block}
  .word{display:flex;flex-direction:column;align-items:flex-start;gap:14px;padding-left:8px}
  .word h1{
    margin:0;font-weight:500;
    font-size: clamp(40px, 6vw, 72px);
    letter-spacing:.22em;color:var(--navy);line-height:1;
  }
  .rule{
    width:100%;max-width:560px;height:1px;
    background:linear-gradient(90deg, transparent, var(--gold) 15%, var(--gold) 85%, transparent);
  }
  .tag{
    margin:2px 0 0;font-weight:400;
    font-size: clamp(12px, 1.1vw, 16px);
    letter-spacing:.42em;color:var(--gold-soft);text-transform:uppercase;
  }
  @media (max-width: 720px){
    .banner{grid-template-columns:1fr;text-align:center;padding:32px}
    .word{align-items:center;padding-left:0}
    .rule{margin:0 auto}
  }
</style></head><body>
