<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none">
  <defs>
    <!-- Left S: darker gold -->
    <linearGradient id="gL" x1="100" y1="42" x2="30" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C6D0A"/>
    </linearGradient>
    <!-- Right S: brighter gold -->
    <linearGradient id="gR" x1="170" y1="42" x2="100" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5D87E"/>
      <stop offset="100%" stop-color="#D4AF37"/>
    </linearGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect width="200" height="200" rx="44" fill="#1A1A1A"/>

  <!--
    Left S  — 3-segment cubic bezier tracing a proper S shape
    Starts top-right (100,42), sweeps left for upper arc,
    crosses centre, sweeps right for lower arc, ends bottom-left (30,160)
  -->
  <path
    d="M 100,42
       C 100,22 30,22 30,62
       C 30,102 100,102 100,142
       C 100,178 30,178 30,160"
    stroke="url(#gL)"
    stroke-width="20"
    stroke-linecap="round"
    fill="none"
  />

  <!--
    Right S — identical shape shifted +70 right
    Starts top-right (170,42), ends bottom-left (100,160)
    Interlocks with Left S at the shared centre point (100,102)
  -->
  <path
    d="M 170,42
       C 170,22 100,22 100,62
       C 100,102 170,102 170,142
       C 170,178 100,178 100,160"
    stroke="url(#gR)"
    stroke-width="20"
    stroke-linecap="round"
    fill="none"
  />
</svg>
